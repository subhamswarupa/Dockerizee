services:
  mongodb:
    image: mongo:7-jammy
    container_name: taskmanager-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    networks:
      - taskmanager-network
    healthcheck:
      test: mongosh --quiet --eval "db.adminCommand('ping')"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskmanager-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/taskmanager
      - PORT=5000
      - NODE_ENV=production
      - CORS_ORIGIN=http://localhost:5173
    ports:
      - "5000:5000"
    networks:
      - taskmanager-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000/api
    container_name: taskmanager-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_API_URL=http://localhost:5000/api
    ports:
      - "5173:5173"
    networks:
      - taskmanager-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5173"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  taskmanager-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
